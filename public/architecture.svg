<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <rect width="900" height="520" fill="#0b1120"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-family="monospace" font-size="15" font-weight="600" fill="#e2e8f0">System Architecture</text>

  <!-- Browser -->
  <rect x="40" y="70" width="160" height="70" rx="8" fill="#0f1f3d" stroke="#378ADD" stroke-width="1.5"/>
  <text x="120" y="100" text-anchor="middle" font-family="monospace" font-size="13" font-weight="600" fill="#378ADD">Browser</text>
  <text x="120" y="120" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">React + Vite</text>
  <text x="120" y="135" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">Vercel</text>

  <!-- Arrow browser to express -->
  <line x1="200" y1="105" x2="290" y2="105" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="245" y="96" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">HTTPS /api/*</text>

  <!-- Express -->
  <rect x="290" y="70" width="180" height="70" rx="8" fill="#1a0f3d" stroke="#7F77DD" stroke-width="1.5"/>
  <text x="380" y="100" text-anchor="middle" font-family="monospace" font-size="13" font-weight="600" fill="#7F77DD">Express API</text>
  <text x="380" y="120" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">Node.js 18+</text>
  <text x="380" y="135" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">Render</text>

  <!-- Arrow express to redis -->
  <line x1="380" y1="140" x2="380" y2="220" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="400" y="185" font-family="monospace" font-size="10" fill="#475569">check cache</text>

  <!-- Redis -->
  <rect x="290" y="222" width="180" height="70" rx="8" fill="#0f2a1f" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="380" y="252" text-anchor="middle" font-family="monospace" font-size="13" font-weight="600" fill="#1D9E75">Redis</text>
  <text x="380" y="270" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">Key Value Store</text>
  <text x="380" y="284" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">TTL 1h · Render</text>

  <!-- Cache HIT back to browser -->
  <path d="M290 257 L220 257 L220 130 L200 130" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr-green)"/>
  <text x="228" y="200" font-family="monospace" font-size="10" fill="#1D9E75">HIT</text>

  <!-- Cache MISS to errorEngine -->
  <line x1="380" y1="292" x2="380" y2="360" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr-red)"/>
  <text x="400" y="330" font-family="monospace" font-size="10" fill="#E24B4A">MISS</text>

  <!-- errorEngine -->
  <rect x="270" y="362" width="220" height="70" rx="8" fill="#2a1a0f" stroke="#BA7517" stroke-width="1.5"/>
  <text x="380" y="392" text-anchor="middle" font-family="monospace" font-size="13" font-weight="600" fill="#BA7517">errorEngine.js</text>
  <text x="380" y="410" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">join · filter · compute</text>
  <text x="380" y="424" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">pure function · no I/O</text>

  <!-- BMRS APIs -->
  <rect x="580" y="222" width="160" height="70" rx="8" fill="#1a1a0f" stroke="#BA7517" stroke-width="1.5"/>
  <text x="660" y="249" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#BA7517">BMRS API</text>
  <text x="660" y="267" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">FUELHH /stream</text>
  <text x="660" y="282" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">WINDFOR /datasets</text>

  <!-- Express to BMRS -->
  <line x1="470" y1="257" x2="578" y2="257" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="524" y="248" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">fetch live</text>

  <!-- BMRS to errorEngine -->
  <path d="M660 292 L660 400 L492 400" fill="none" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Jupyter -->
  <rect x="580" y="362" width="160" height="70" rx="8" fill="#0f1a2a" stroke="#378ADD" stroke-width="1.5"/>
  <text x="660" y="392" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#378ADD">Jupyter Notebook</text>
  <text x="660" y="410" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">GET /api/analysis</text>
  <text x="660" y="424" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">Python · pandas · scipy</text>

  <!-- Jupyter to Express -->
  <line x1="580" y1="397" x2="472" y2="397" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Legend -->
  <text x="40" y="478" font-family="monospace" font-size="11" fill="#1D9E75">--- cache HIT path</text>
  <text x="40" y="498" font-family="monospace" font-size="11" fill="#E24B4A">--- cache MISS path</text>
  <text x="260" y="478" font-family="monospace" font-size="11" fill="#334155">— standard request</text>

  <!-- Markers -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#334155" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
</svg>
