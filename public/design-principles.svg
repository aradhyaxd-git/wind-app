<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480">
  <rect width="900" height="480" fill="#0b1120"/>
  <text x="450" y="34" text-anchor="middle" font-family="monospace" font-size="15" font-weight="600" fill="#e2e8f0">Design Principles</text>

  <!-- P1 -->
  <rect x="30" y="58" width="260" height="180" rx="8" fill="#0f1f3d" stroke="#378ADD" stroke-width="1"/>
  <text x="160" y="84" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#378ADD">Cache-aside pattern</text>
  <line x1="50" y1="96" x2="270" y2="96" stroke="#1e3a5f" stroke-width="1"/>
  <text x="50" y="118" font-family="monospace" font-size="10" fill="#64748b">Check Redis before hitting BMRS.</text>
  <text x="50" y="136" font-family="monospace" font-size="10" fill="#64748b">On MISS: fetch, compute, store.</text>
  <text x="50" y="154" font-family="monospace" font-size="10" fill="#64748b">On HIT: return immediately.</text>
  <text x="50" y="178" font-family="monospace" font-size="10" fill="#475569">First request: 3–5s</text>
  <text x="50" y="196" font-family="monospace" font-size="10" fill="#1D9E75">Repeat request: &lt;50ms</text>
  <text x="50" y="218" font-family="monospace" font-size="10" fill="#475569">Redis unavailable: app still works</text>

  <!-- P2 -->
  <rect x="320" y="58" width="260" height="180" rx="8" fill="#1a0f3d" stroke="#7F77DD" stroke-width="1"/>
  <text x="450" y="84" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#7F77DD">Pure core logic</text>
  <line x1="340" y1="96" x2="560" y2="96" stroke="#2d1f5f" stroke-width="1"/>
  <text x="340" y="118" font-family="monospace" font-size="10" fill="#64748b">errorEngine.js has zero side</text>
  <text x="340" y="136" font-family="monospace" font-size="10" fill="#64748b">effects. Arrays in, arrays out.</text>
  <text x="340" y="154" font-family="monospace" font-size="10" fill="#64748b">No Express, no Redis, no fetch.</text>
  <text x="340" y="178" font-family="monospace" font-size="10" fill="#475569">Same fn runs for dashboard</text>
  <text x="340" y="196" font-family="monospace" font-size="10" fill="#475569">and analysis endpoint.</text>
  <text x="340" y="218" font-family="monospace" font-size="10" fill="#475569">Unit testable in isolation.</text>

  <!-- P3 -->
  <rect x="610" y="58" width="260" height="180" rx="8" fill="#0f2a1f" stroke="#1D9E75" stroke-width="1"/>
  <text x="740" y="84" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#1D9E75">Atomic UI updates</text>
  <line x1="630" y1="96" x2="850" y2="96" stroke="#0f3020" stroke-width="1"/>
  <text x="630" y="118" font-family="monospace" font-size="10" fill="#64748b">/api/data returns dataPoints</text>
  <text x="630" y="136" font-family="monospace" font-size="10" fill="#64748b">and metrics in one response.</text>
  <text x="630" y="154" font-family="monospace" font-size="10" fill="#64748b">Chart and KPI cards update</text>
  <text x="630" y="172" font-family="monospace" font-size="10" fill="#64748b">together, never separately.</text>
  <text x="630" y="196" font-family="monospace" font-size="10" fill="#475569">No stale intermediate state</text>
  <text x="630" y="214" font-family="monospace" font-size="10" fill="#475569">visible to the user.</text>

  <!-- P4 -->
  <rect x="30" y="268" width="260" height="180" rx="8" fill="#2a1a0f" stroke="#BA7517" stroke-width="1"/>
  <text x="160" y="294" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#BA7517">Graceful degradation</text>
  <line x1="50" y1="306" x2="270" y2="306" stroke="#4a2f0f" stroke-width="1"/>
  <text x="50" y="328" font-family="monospace" font-size="10" fill="#64748b">Redis down: requests fall</text>
  <text x="50" y="346" font-family="monospace" font-size="10" fill="#64748b">through to BMRS directly.</text>
  <text x="50" y="364" font-family="monospace" font-size="10" fill="#64748b">BMRS slow: user sees loading</text>
  <text x="50" y="382" font-family="monospace" font-size="10" fill="#64748b">state, not a broken UI.</text>
  <text x="50" y="406" font-family="monospace" font-size="10" fill="#475569">X-Cache header makes cache</text>
  <text x="50" y="424" font-family="monospace" font-size="10" fill="#475569">state observable at all times.</text>

  <!-- P5 -->
  <rect x="320" y="268" width="260" height="180" rx="8" fill="#0f1a2a" stroke="#378ADD" stroke-width="1"/>
  <text x="450" y="294" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#378ADD">Separation of concerns</text>
  <line x1="340" y1="306" x2="560" y2="306" stroke="#0f2a40" stroke-width="1"/>
  <text x="340" y="328" font-family="monospace" font-size="10" fill="#64748b">index.js: process lifecycle</text>
  <text x="340" y="346" font-family="monospace" font-size="10" fill="#64748b">app.js: HTTP config</text>
  <text x="340" y="364" font-family="monospace" font-size="10" fill="#64748b">routes/: request handling</text>
  <text x="340" y="382" font-family="monospace" font-size="10" fill="#64748b">services/: external I/O</text>
  <text x="340" y="400" font-family="monospace" font-size="10" fill="#64748b">utils/: computation</text>
  <text x="340" y="424" font-family="monospace" font-size="10" fill="#475569">Each layer has one job.</text>

  <!-- P6 -->
  <rect x="610" y="268" width="260" height="180" rx="8" fill="#1a0f0f" stroke="#E24B4A" stroke-width="1"/>
  <text x="740" y="294" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#E24B4A">Data fidelity first</text>
  <line x1="630" y1="306" x2="850" y2="306" stroke="#4a1010" stroke-width="1"/>
  <text x="630" y="328" font-family="monospace" font-size="10" fill="#64748b">WINDFOR is day-ahead only.</text>
  <text x="630" y="346" font-family="monospace" font-size="10" fill="#64748b">Horizon &lt;17h returns no data</text>
  <text x="630" y="364" font-family="monospace" font-size="10" fill="#64748b">rather than incorrect data.</text>
  <text x="630" y="382" font-family="monospace" font-size="10" fill="#64748b">Missing forecast slots are</text>
  <text x="630" y="400" font-family="monospace" font-size="10" fill="#64748b">silently skipped per spec.</text>
  <text x="630" y="424" font-family="monospace" font-size="10" fill="#475569">No fake values, ever.</text>
</svg>
