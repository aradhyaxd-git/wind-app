<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" width="900" height="440">
  <rect width="900" height="440" fill="#0b1120"/>

  <text x="450" y="34" text-anchor="middle" font-family="monospace" font-size="15" font-weight="600" fill="#e2e8f0">Request Flow — /api/data</text>

  <!-- Step boxes -->
  <!-- 1 -->
  <rect x="30" y="70" width="130" height="56" rx="6" fill="#0f1f3d" stroke="#378ADD" stroke-width="1"/>
  <text x="95" y="95" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#378ADD">1. User selects</text>
  <text x="95" y="113" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">date range + horizon</text>

  <!-- 2 -->
  <rect x="210" y="70" width="130" height="56" rx="6" fill="#0f1f3d" stroke="#378ADD" stroke-width="1"/>
  <text x="275" y="95" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#378ADD">2. Debounce 400ms</text>
  <text x="275" y="113" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">useForecastData hook</text>

  <!-- 3 -->
  <rect x="390" y="70" width="130" height="56" rx="6" fill="#0f1f3d" stroke="#378ADD" stroke-width="1"/>
  <text x="455" y="95" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#378ADD">3. GET /api/data</text>
  <text x="455" y="113" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">from · to · horizon</text>

  <!-- 4 decision -->
  <polygon points="620,70 740,98 620,126 500,98" fill="#1a1a0f" stroke="#BA7517" stroke-width="1"/>
  <text x="620" y="94" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#BA7517">4. Redis</text>
  <text x="620" y="110" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">cache check</text>

  <!-- Arrows top row -->
  <line x1="160" y1="98" x2="208" y2="98" stroke="#334155" stroke-width="1.5" marker-end="url(#a1)"/>
  <line x1="340" y1="98" x2="388" y2="98" stroke="#334155" stroke-width="1.5" marker-end="url(#a1)"/>
  <line x1="520" y1="98" x2="498" y2="98" stroke="#334155" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- HIT path — down from diamond -->
  <line x1="620" y1="126" x2="620" y2="190" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="632" y="163" font-family="monospace" font-size="10" fill="#1D9E75">HIT</text>

  <rect x="530" y="192" width="180" height="56" rx="6" fill="#0f2a1f" stroke="#1D9E75" stroke-width="1"/>
  <text x="620" y="217" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#1D9E75">5a. Return cached</text>
  <text x="620" y="235" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">X-Cache: HIT · &lt;50ms</text>

  <!-- MISS path — right from diamond -->
  <line x1="740" y1="98" x2="820" y2="98" stroke="#E24B4A" stroke-width="1.5" marker-end="url(#a3)"/>
  <text x="775" y="88" text-anchor="middle" font-family="monospace" font-size="10" fill="#E24B4A">MISS</text>

  <rect x="782" y="70" width="100" height="56" rx="6" fill="#2a0f0f" stroke="#E24B4A" stroke-width="1"/>
  <text x="832" y="95" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#E24B4A">5b. Fetch</text>
  <text x="832" y="113" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">BMRS API</text>

  <!-- BMRS to errorEngine -->
  <line x1="832" y1="126" x2="832" y2="192" stroke="#334155" stroke-width="1.5" marker-end="url(#a1)"/>

  <rect x="762" y="192" width="140" height="56" rx="6" fill="#2a1a0f" stroke="#BA7517" stroke-width="1"/>
  <text x="832" y="217" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#BA7517">6. errorEngine</text>
  <text x="832" y="235" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">join · metrics</text>

  <!-- errorEngine to store -->
  <line x1="832" y1="248" x2="832" y2="302" stroke="#334155" stroke-width="1.5" marker-end="url(#a1)"/>

  <rect x="762" y="304" width="140" height="56" rx="6" fill="#0f2a1f" stroke="#1D9E75" stroke-width="1"/>
  <text x="832" y="329" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#1D9E75">7. Store Redis</text>
  <text x="832" y="347" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">TTL 1 hour</text>

  <!-- Both paths converge to response -->
  <line x1="620" y1="248" x2="620" y2="304" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#a2)"/>
  <line x1="762" y1="332" x2="710" y2="332" stroke="#334155" stroke-width="1.5" marker-end="url(#a1)"/>

  <rect x="480" y="304" width="228" height="56" rx="6" fill="#1a0f3d" stroke="#7F77DD" stroke-width="1"/>
  <text x="594" y="329" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#7F77DD">8. Response</text>
  <text x="594" y="347" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">{ dataPoints, metrics }</text>

  <!-- Response back to browser -->
  <path d="M480 332 L95 332 L95 128" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#a4)"/>
  <text x="260" y="380" text-anchor="middle" font-family="monospace" font-size="10" fill="#7F77DD">chart + KPI cards update atomically</text>

  <defs>
    <marker id="a1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#334155" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="a3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="a4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>
</svg>
