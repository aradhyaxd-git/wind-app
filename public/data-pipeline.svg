<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" width="900" height="360">
  <rect width="900" height="360" fill="#0b1120"/>
  <text x="450" y="34" text-anchor="middle" font-family="monospace" font-size="15" font-weight="600" fill="#e2e8f0">Data Pipeline — BMRS to Response</text>

  <!-- FUELHH -->
  <rect x="30" y="70" width="160" height="100" rx="8" fill="#1a1a0f" stroke="#BA7517" stroke-width="1"/>
  <text x="110" y="96" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#BA7517">FUELHH</text>
  <line x1="50" y1="106" x2="170" y2="106" stroke="#3a2f0f" stroke-width="1"/>
  <text x="50" y="124" font-family="monospace" font-size="10" fill="#64748b">startTime (30-min)</text>
  <text x="50" y="140" font-family="monospace" font-size="10" fill="#64748b">generation (MW)</text>
  <text x="50" y="156" font-family="monospace" font-size="10" fill="#475569">fuelType=WIND</text>

  <!-- WINDFOR -->
  <rect x="30" y="196" width="160" height="110" rx="8" fill="#1a1a0f" stroke="#BA7517" stroke-width="1"/>
  <text x="110" y="222" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#BA7517">WINDFOR</text>
  <line x1="50" y1="232" x2="170" y2="232" stroke="#3a2f0f" stroke-width="1"/>
  <text x="50" y="250" font-family="monospace" font-size="10" fill="#64748b">startTime (1-hour)</text>
  <text x="50" y="268" font-family="monospace" font-size="10" fill="#64748b">publishTime</text>
  <text x="50" y="286" font-family="monospace" font-size="10" fill="#64748b">generation (MW)</text>
  <text x="50" y="302" font-family="monospace" font-size="10" fill="#475569">~8 runs/day · 46h ahead</text>

  <!-- Arrow to aggregation -->
  <line x1="190" y1="120" x2="260" y2="200" stroke="#334155" stroke-width="1.5" marker-end="url(#b1)"/>
  <line x1="190" y1="251" x2="260" y2="230" stroke="#334155" stroke-width="1.5" marker-end="url(#b1)"/>

  <!-- Aggregation -->
  <rect x="262" y="158" width="160" height="100" rx="8" fill="#0f1a2a" stroke="#378ADD" stroke-width="1"/>
  <text x="342" y="182" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#378ADD">Prepare</text>
  <line x1="280" y1="192" x2="400" y2="192" stroke="#0f2a40" stroke-width="1"/>
  <text x="280" y="210" font-family="monospace" font-size="10" fill="#64748b">30-min → hourly avg</text>
  <text x="280" y="228" font-family="monospace" font-size="10" fill="#64748b">index forecasts by</text>
  <text x="280" y="244" font-family="monospace" font-size="10" fill="#64748b">startTime (O(1) lookup)</text>

  <!-- Arrow to errorEngine -->
  <line x1="422" y1="208" x2="492" y2="208" stroke="#334155" stroke-width="1.5" marker-end="url(#b1)"/>

  <!-- errorEngine -->
  <rect x="494" y="158" width="180" height="130" rx="8" fill="#2a1a0f" stroke="#BA7517" stroke-width="1.5"/>
  <text x="584" y="182" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#BA7517">errorEngine.js</text>
  <line x1="514" y1="192" x2="654" y2="192" stroke="#4a2f0f" stroke-width="1"/>
  <text x="514" y="212" font-family="monospace" font-size="10" fill="#64748b">for each actual slot:</text>
  <text x="514" y="230" font-family="monospace" font-size="10" fill="#64748b">  find forecasts for time T</text>
  <text x="514" y="248" font-family="monospace" font-size="10" fill="#64748b">  filter publishTime ≤ T-H</text>
  <text x="514" y="266" font-family="monospace" font-size="10" fill="#64748b">  pick latest qualifying</text>
  <text x="514" y="282" font-family="monospace" font-size="10" fill="#64748b">  compute error + errorPct</text>

  <!-- Arrow to output -->
  <line x1="674" y1="223" x2="734" y2="223" stroke="#334155" stroke-width="1.5" marker-end="url(#b1)"/>

  <!-- Output -->
  <rect x="736" y="158" width="140" height="160" rx="8" fill="#1a0f3d" stroke="#7F77DD" stroke-width="1"/>
  <text x="806" y="182" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#7F77DD">Output</text>
  <line x1="754" y1="192" x2="858" y2="192" stroke="#2d1f5f" stroke-width="1"/>
  <text x="754" y="212" font-family="monospace" font-size="10" fill="#64748b">time</text>
  <text x="754" y="230" font-family="monospace" font-size="10" fill="#64748b">actual (MW)</text>
  <text x="754" y="248" font-family="monospace" font-size="10" fill="#64748b">forecast (MW)</text>
  <text x="754" y="266" font-family="monospace" font-size="10" fill="#BA7517">error (MW)</text>
  <text x="754" y="284" font-family="monospace" font-size="10" fill="#BA7517">errorPct (%)</text>
  <text x="754" y="302" font-family="monospace" font-size="10" fill="#7F77DD">+ metrics{}</text>

  <!-- Horizon label -->
  <text x="450" y="316" text-anchor="middle" font-family="monospace" font-size="11" fill="#475569">H = horizon in ms  |  slots with no qualifying forecast are silently skipped</text>

  <defs>
    <marker id="b1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#334155" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>
</svg>
